########################################
# Production Profile (운영 환경)
# 사용 DB: MySQL
#
# Railway 등 클라우드: MySQL 서비스를 연결하면 MYSQLHOST, MYSQLPORT,
# MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE 가 주입됩니다(값은 패널에서 확인).
# 같은 프로젝트 내 앱은 내부 호스트(mysql.railway.internal)를 쓰고,
# 로컬 PC에서만 DB에 붙을 때는 MYSQL_PUBLIC_URL 기준 호스트/포트를
# 환경 변수로 맞추면 됩니다(비밀번호는 저장소에 넣지 말 것).
#
# 우선순위: SPRING_DATASOURCE_URL / USERNAME / PASSWORD 환경 변수가
# 설정되면 이 파일의 url·username·password 보다 우선합니다.
#
# Redis(Railway): Redis 플러그인 연결 시 REDISHOST, REDISPORT, REDISUSER,
# REDISPASSWORD(또는 REDIS_PASSWORD)가 주입됩니다. 앱이 Railway 내부에서
# 떠 있으면 내부 호스트(redis.railway.internal)를 씁니다.
# SPRING_DATA_REDIS_* / REDISSON_* 환경 변수는 항상 이 YAML보다 우선합니다.
########################################
spring:
  ########################################
  # DevTools (운영 환경 비활성화)
  ########################################
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  ########################################
  # DataSource (MySQL)
  ########################################
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:cinema}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectTimeout=30000&socketTimeout=30000&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:cinema_user}
    password: ${MYSQLPASSWORD:cinema_26118791}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1 # DB 연결 실패해도 서버 시작
      connection-timeout: 30000 # 클라우드 DB 지연 대비
      maximum-pool-size: 10
      minimum-idle: 2

  ########################################
  # JPA (MySQL)
  ########################################
  jpa:
    open-in-view: false
    defer-datasource-initialization: true # DataSource 초기화 지연
    hibernate:
      ddl-auto: none # 운영 환경: 스키마 자동 생성 비활성화
    show-sql: false # 운영 환경: SQL 로그 비활성화
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect # MySQL용 dialect

  ########################################
  # Redis (Lettuce / Spring Data Redis)
  ########################################
  data:
    redis:
      host: ${REDISHOST:localhost}
      port: ${REDISPORT:6379}
      username: ${REDISUSER:}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
      timeout: 5000ms
      connect-timeout: 15000ms

########################################
# Redisson (분산 락 — 호스트·포트·인증은 위 Redis와 동일 변수 사용)
########################################
redisson:
  single-server-config:
    address: redis://${REDISHOST:localhost}:${REDISPORT:6379}
    username: ${REDISUSER:}
    password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
    connection-minimum-idle-size: 5
    connection-pool-size: 16
    idle-connection-timeout: 10000
    connect-timeout: 15000
    timeout: 5000
    retry-attempts: 3
    retry-interval: 1500

########################################
# API 문서 (운영: 필요 시 비활성화)
########################################
springdoc:
  swagger-ui:
    enabled: true  # false로 설정 시 Swagger UI 비활성화

########################################
# Auth (운영: HTTPS 환경 시 secure-cookie: true)
########################################
auth:
  refresh-token:
    secure-cookie: true  # HTTPS 필수

########################################
# CORS (운영: 허용 오리진 제한)
########################################
cors:
  allowed-origins: https://your-domain.com  # 운영 도메인으로 변경

########################################
# Logging (운영 환경)
########################################
logging:
  level:
    root: INFO
    "[com.cinema]": INFO
    "[org.springframework]": WARN
    "[org.springframework.web]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.hibernate.orm.jdbc.bind]": WARN
